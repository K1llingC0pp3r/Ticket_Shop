<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <style>
    body {
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    .main-container {
      background-color: #fff;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 400px;
      margin: 60px auto;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="navApp">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">TicketShop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search_tickets.html">Browse Events</a></li>
          <li class="nav-item"><a class="nav-link" href="shopping_cart.html">Cart</a></li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="order_history.html">My Orders</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="#" @click.prevent="logout">Logout ({{ userName }})</a>
          </li>
          <li class="nav-item" v-else>
            <a class="nav-link" href="login.html">Login/Register</a>
          </li>
          <li class="nav-item" v-if="isAdmin">
            <a class="nav-link" href="admin_dashboard.html">Admin Dashboard</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div id="loginApp">
  <div class="main-container">
    <h2>Login</h2>
    <form @submit.prevent="handleLogin">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" v-model="form.email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" v-model="form.password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-center mt-3">
      <a href="register.html">Nemáš účet? Registrovat se</a><br>
      <a href="request_password_reset.html">Zapomenuté heslo?</a>
    </div>

    <div v-if="message" class="alert mt-3" :class="{'alert-success': success, 'alert-danger': !success}">
      {{ message }}
    </div>
  </div>
</div>

<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js">
</script>
<script>
const navApp = Vue.createApp({
  data() {
    return {
      isLoggedIn:false,
      userName:"",
      isAdmin:false
    };
  },
  methods: {
    async checkSession() {
      try {
        const resp = await fetch('session_check.php');
        const j = await resp.json();
        if (j.success) {
          this.isLoggedIn = true;
          this.userName   = j.data.name;
          this.isAdmin    = (j.data.role === 'admin');
        } else {
          this.isLoggedIn = false;
          this.isAdmin    = false;
        }
      } catch(e) {
        console.error(e);
      }
    },
    async logout() {
      try {
        const resp=await fetch('logout.php');
        const j=await resp.json();
        if(j.success) {
          window.location.href='login.html';
        }
      } catch(e) {
        console.error(e);
      }
    }
  },
  mounted() {
    this.checkSession();
  }
});
navApp.mount('#navApp');

const loginApp = Vue.createApp({
  data() {
    return {
      form: { email:'', password:'' },
      message:'',
      success:false
    };
  },
  methods: {
    async handleLogin() {
      try {
        const resp=await fetch('login.php',{
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams(this.form)
        });
        const result=await resp.json();
        this.success=result.success;
        this.message=result.message;
        if(result.success){
          if(result.data.role === 'admin'){
            window.location.href='admin_dashboard.html';
          } else {
            window.location.href='index.html';
          }
        }
      } catch(e) {
        console.error(e);
        this.success=false;
        this.message="Error logging in.";
      }
    }
  }
});
loginApp.mount('#loginApp');
</script>

</body>
</html>
