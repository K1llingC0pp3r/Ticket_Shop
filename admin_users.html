<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta charset="UTF-8">
  <title>Admin: Manage Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>

  <style>
    body {
      background-color: #eceff1;
      margin: 0; 
      padding: 0;
    }
    .main-container {
      background-color: #fff;
      border-radius: 8px;
      padding: 20px;
      margin: 40px auto;
      max-width: 1200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    h2{
      text-align: center;
      margin-bottom: 20px;
    }
    .card {
      border: 1px solid #ccc; 
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }
    .card-body{
      display: flex; 
      flex-direction: column;
    }
    .role-badge{
      font-weight: bold; 
      padding: 0.2rem 0.5rem; 
      border-radius: 4px;
    }
    .role-admin {
      background-color: #ff7043; 
      color: #fff;
    }
    .role-user {
      background-color: #9ccc65; 
      color: #fff;
    }
  </style>
</head>
<body>

<div id="navApp">
  <nav class="navbar navbar-expand-lg bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand text-light" href="admin_dashboard.html">Admin Dashboard</a>
      <button class="navbar-toggler text-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-light" href="admin_events.html">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="admin_orders.html">Orders</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light active" aria-current="page" href="admin_users.html">Users</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link text-light" href="profile.html">Profile</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link text-light" href="#" @click.prevent="logout">Logout ({{ userName }})</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div id="app" class="mt-3">
  <div class="main-container">
    <button class="btn btn-secondary back-btn" @click="goDashboard">← Back to Dashboard</button>
    <h2>Manage Users</h2>

    <div class="row g-2 mb-3">
      <div class="col-md-4">
        <input 
          type="text"
          class="form-control"
          v-model="searchName"
          placeholder="Search by name or email"
        >
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" @click="fetchUsers">Search</button>
      </div>
    </div>

    <div v-if="users.length>0" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <div v-for="u in users" :key="u.id" class="col d-flex">
        <div class="card flex-fill d-flex flex-column">
          <div class="card-body">
            <h5 class="card-title">User #{{ u.id }}</h5>
            <p class="card-text flex-grow-1">
              <strong>Name:</strong> {{u.name}}<br>
              <strong>Email:</strong> {{u.email}}<br>
              <strong>Role:</strong>
              <span
                class="role-badge"
                :class="{'role-admin': u.role==='admin', 'role-user': u.role==='user'}"
              >
                {{ u.role }}
              </span><br>
              <strong>Verified:</strong> {{ u.is_verified ? 'Yes':'No' }}
            </p>
            <div class="mt-auto">
              <button
                class="btn btn-sm btn-warning me-2"
                @click="changeRole(u)"
              >
                {{ (u.role==='admin') ? 'Make User' : 'Make Admin' }}
              </button>
              <button
                class="btn btn-sm btn-danger"
                @click="deleteUser(u.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div v-else class="alert alert-info text-center">
      No users found.
    </div>

    <div v-if="message" class="alert mt-3" 
         :class="{'alert-success': success, 'alert-danger': !success}"
    >
      {{ message }}
    </div>
  </div>
</div>


<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<script>
const navApp = Vue.createApp({
  data(){
    return {
      isLoggedIn:false,
      userName:"",
      isAdmin:false
    };
  },
  methods:{
    async checkSession(){
      try{
        const r=await fetch('session_check.php');
        const j=await r.json();
        if(j.success){
          this.isLoggedIn=true;
          this.userName=j.data.name;
          this.isAdmin=(j.data.role==='admin');
        } else {
          this.isLoggedIn=false; 
          this.isAdmin=false;
        }
      }catch(e){
        console.error(e);
      }
    },
    async logout(){
      try{
        const r=await fetch('logout.php');
        const j=await r.json();
        if(j.success){
          window.location.href='login.html';
        }
      }catch(e){
        console.error(e);
      }
    }
  },
  mounted(){
    this.checkSession();
  }
});
navApp.mount('#navApp');

const app = Vue.createApp({
  data(){
    return {
      users:[],
      searchName:"",
      message:"",
      success:false
    };
  },
  methods:{
    async fetchUsers(){
      const params=new URLSearchParams({ search:this.searchName });
      const resp=await fetch('admin_users.php?'+params.toString());
      const j=await resp.json();
      if(j.success){
        this.users=j.data;
      } else {
        this.message=j.message||"Failed to fetch users";
        this.success=false;
      }
    },
    goDashboard(){
  window.location.href='admin_dashboard.html';
},
    async changeRole(u){
      let newRole = (u.role==='admin' ? 'user' : 'admin');
      if(!confirm(`Change role of user #${u.id} to ${newRole}?`)) return;
      try {
        const r=await fetch('admin_users.php',{
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams({
            action:'update_role',
            user_id:u.id,
            role:newRole
          })
        });
        const j=await r.json();
        if(j.success){
          this.message="Role updated for user #"+u.id;
          this.success=true;
          this.fetchUsers();
        } else {
          this.message=j.message||"Failed to update role";
          this.success=false;
        }
      } catch(e){
        console.error(e);
        this.message="Error updating role";
        this.success=false;
      }
    },
    async deleteUser(uid){
      if(!confirm("Are you sure to delete user #"+uid+" ?")) return;
      try{
        const r=await fetch('admin_users.php',{
          method:'DELETE',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:'user_id='+uid
        });
        const j=await r.json();
        if(j.success){
          this.message="User #"+uid+" deleted.";
          this.success=true;
          this.fetchUsers();
        } else {
          this.message=j.message||"Failed to delete user.";
          this.success=false;
        }
      }catch(e){
        console.error(e);
        this.message="Error deleting user.";
        this.success=false;
      }
    }
  },
  mounted(){
    this.fetchUsers();
  }
});
app.mount('#app');
</script>
</body>
</html>
