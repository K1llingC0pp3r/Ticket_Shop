<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile</title>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <style>
    body {
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    .main-container {
      background-color: #fff;
      border-radius: 8px;
      padding: 20px;
      margin: 40px auto;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    .profile-info {
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .profile-info p {
      margin: 0;
    }
  </style>
</head>
<body>

<div id="navApp">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">TicketShop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item" v-if="!isAdmin"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item" v-if="!isAdmin"><a class="nav-link" href="search_tickets.html">Browse Events</a></li>
          <li class="nav-item" v-if="!isAdmin"><a class="nav-link" href="shopping_cart.html">Cart</a></li>
          <li class="nav-item" v-if="isLoggedIn && !isAdmin">
            <a class="nav-link" href="order_history.html">My Orders</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="#" @click.prevent="logout">Logout({{ userName }})</a>
          </li>
          <li class="nav-item" v-else>
            <a class="nav-link" href="login.html">Login/Register</a>
          </li>
          <li class="nav-item" v-if="isAdmin">
            <a class="nav-link" href="admin_dashboard.html">Admin Dashboard</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div id="profileApp">
  <div class="main-container">
    <h2>User Profile</h2>

    <div class="profile-info mb-4">
      <p><strong>Name:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
    </div>

    <div class="card p-3 mb-3">
      <h4>Update Email</h4>
      <input type="email" v-model="newEmail" placeholder="Enter new email" class="form-control mt-2">
      <button class="btn btn-primary mt-2" @click="updateEmail">Update Email</button>
    </div>

    <div class="card p-3 mb-3">
      <h4>Change Password</h4>
      <input type="password" v-model="newPassword" placeholder="New password" class="form-control mt-2">
      <input type="password" v-model="confirmPassword" placeholder="Confirm password" class="form-control mt-2">
      <button class="btn btn-warning mt-2" @click="updatePassword">Change Password</button>
    </div>

    <div v-if="message" class="alert mt-3" :class="{'alert-success': success, 'alert-danger': !success}">
      {{ message }}
    </div>
  </div>
</div>

<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js">
</script>

<script>
const navApp = Vue.createApp({
  data() {
    return {
      isLoggedIn:false,
      userName:"",
      isAdmin:false
    };
  },
  methods: {
    async checkSession() {
      const resp=await fetch('session_check.php');
      const j=await resp.json();
      if(j.success) {
        this.isLoggedIn=true;
        this.userName=j.data.name;
        this.isAdmin=(j.data.role==='admin');
      } else {
        this.isLoggedIn=false;
        this.isAdmin=false;
      }
    },
    async logout() {
      const resp=await fetch('logout.php');
      const j=await resp.json();
      if(j.success) {
        window.location.href='login.html';
      }
    }
  },
  mounted() {
    this.checkSession();
  }
});
navApp.mount('#navApp');
</script>

<script>
  const profileApp = Vue.createApp({
    data() {
      return {
        user: { name: '', email: '' },
        newEmail: '',
        newPassword: '',
        confirmPassword: '',
        message: '',
        success: false
      };
    },
    methods: {
      async fetchUserProfile() {
        try {
          const r = await fetch('profile.php?action=get_user');
          const j = await r.json();
          if (j.success) {
            this.user = j.data;
          } else {
            this.message = j.message;
            this.success = false;
          }
        } catch (e) {
          console.error(e);
          this.message = "Failed to fetch profile.";
          this.success = false;
        }
      },
      checkEmail() {
        const emailRegex = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
        if (!emailRegex.test(this.newEmail)) {
          this.message = "Invalid email format.";
          this.success = false;
          return false;
        }
        return true;
      },
      checkPassword() {
        const passRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
        if (!passRegex.test(this.newPassword)) {
          this.message = "Password must be at least 8 characters, contain a letter and a digit.";
          this.success = false;
          return false;
        }
        if (this.newPassword !== this.confirmPassword) {
          this.message = "Passwords do not match.";
          this.success = false;
          return false;
        }
        return true;
      },
      async updateEmail() {
        if (!this.checkEmail()) return;
  
        const r = await fetch("profile.php?action=update_email", {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ email: this.newEmail })
        });
        const j = await r.json();
        this.message = j.message;
        this.success = j.success;
        if (j.success) {
          this.user.email = this.newEmail;
          this.newEmail = '';
        }
      },
      async updatePassword() {
        if (!this.checkPassword()) return;
  
        const r = await fetch("profile.php?action=update_password", {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ password: this.newPassword })
        });
        const j = await r.json();
        this.message = j.message;
        this.success = j.success;
        if (j.success) {
          this.newPassword = '';
          this.confirmPassword = '';
        }
      }
    },
    mounted() {
      this.fetchUserProfile();
    }
  });
  profileApp.mount('#profileApp');
  </script>
  
</body>
</html>
