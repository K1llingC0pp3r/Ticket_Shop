<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <style>
    body { background-color: #f2f2f2; margin:0; padding:0;}
    .main-container {
      background-color:#fff; border-radius:8px; padding:30px;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
      max-width:400px; margin:60px auto;
    }
    h2 {
      text-align:center; margin-bottom:20px;
      font-family:"Helvetica Neue",Arial,sans-serif;
    }
  </style>
</head>
<body>

<div id="navApp">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">TicketShop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search_tickets.html">Browse Events</a></li>
          <li class="nav-item"><a class="nav-link" href="shopping_cart.html">Cart</a></li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="order_history.html">My Orders</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
          <li class="nav-item" v-if="isLoggedIn">
            <a class="nav-link" href="#" @click.prevent="logout">Logout({{ userName }})</a>
          </li>
          <li class="nav-item" v-else>
            <a class="nav-link" href="login.html">Login/Register</a>
          </li>
          <li class="nav-item" v-if="isAdmin">
            <a class="nav-link" href="admin_dashboard.html">Admin Dashboard</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div id="registerApp">
  <div class="main-container">
    <h2>Register</h2>
    <form @submit.prevent="handleRegister">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" v-model="form.name" @input="checkInputs" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" v-model="form.email" @input="checkInputs" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" v-model="form.password" @input="checkInputs" required>
      </div>
      <div v-if="errorMsg" class="alert alert-danger">
        {{ errorMsg }}
      </div>
      <button type="submit" class="btn btn-success w-100" :disabled="validationFailed">Register</button>
    </form>

    <div v-if="message" class="alert mt-3" :class="{'alert-success': success, 'alert-danger': !success}">
      {{ message }}
    </div>
  </div>
</div>

<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js">
</script>

<script>
const navApp = Vue.createApp({
  data() {
    return {
      isLoggedIn:false,
      userName:"",
      isAdmin:false
    };
  },
  methods: {
    async checkSession() {
      try {
        const resp = await fetch('session_check.php');
        const j = await resp.json();
        if(j.success) {
          this.isLoggedIn=true;
          this.userName=j.data.name;
          this.isAdmin=(j.data.role==='admin');
        } else {
          this.isLoggedIn=false;
          this.isAdmin=false;
        }
      } catch(e) {
        console.error(e);
      }
    },
    async logout() {
      try {
        const resp=await fetch('logout.php');
        const j=await resp.json();
        if(j.success) {
          window.location.href='login.html';
        }
      } catch(e) {
        console.error(e);
      }
    }
  },
  mounted() {
    this.checkSession();
  }
});
navApp.mount('#navApp');
</script>

<script>
const registerApp = Vue.createApp({
  data() {
    return {
      form: { name:'', email:'', password:'' },
      message:'',
      success:false,
      errorMsg:'',
      validationFailed:true 
    };
  },
  methods: {
    checkInputs() {
      const neeticka = ["idiot","****","vulgar", "negr", "nigga", "niga"];
      let nameLow=this.form.name.toLowerCase();
      for(let w of neeticka) {
        if(nameLow.includes(w)) {
          this.errorMsg=`Please avoid using the word "${w}" in your name.`;
          this.validationFailed=true;
          return;
        }
      }
      const emailRegex=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
      if(!emailRegex.test(this.form.email)) {
        this.errorMsg="Invalid email format.";
        this.validationFailed=true;
        return;
      }
      const passRegex= /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
      if(!passRegex.test(this.form.password)) {
        this.errorMsg="Password must be at least 8 chars, contain a letter and a digit.";
        this.validationFailed=true;
        return;
      }
      this.errorMsg="";
      this.validationFailed=false;
    },
    async handleRegister() {
      try {
        const r=await fetch('register.php',{
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams(this.form)
        });
        const j=await r.json();
        this.success=j.success;
        this.message=j.message;
      } catch(e) {
        console.error(e);
        this.success=false;
        this.message="Error registering.";
      }
    }
  }
});
registerApp.mount('#registerApp');
</script>
</body>
</html>
