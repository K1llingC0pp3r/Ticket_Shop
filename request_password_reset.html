<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Password Reset</title>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <style>
    body { background-color: #f2f2f2; margin:0; padding:0; }
    .main-container {
      background-color: #fff; border-radius:8px; padding:20px;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
      max-width:400px; margin:60px auto;
    }
    h2 { text-align:center; margin-bottom:20px; }
  </style>
</head>
<body>

    <div id="navApp">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <div class="container-fluid">
            <a class="navbar-brand" href="index.html">TicketShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
              <span class="navbar-toggler-icon"></span>
            </button>
      
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="search_tickets.html">Browse Events</a></li>
                <li class="nav-item"><a class="nav-link" href="shopping_cart.html">Cart</a></li>
                <li class="nav-item" v-if="isLoggedIn">
                    <a class="nav-link" href="order_history.html">My Orders</a>
                  </li>
                  <li class="nav-item" v-if="isLoggedIn">
                    <a class="nav-link" href="profile.html">Profile</a>
                  </li>
                  <li class="nav-item" v-if="isLoggedIn">
                    <a class="nav-link" href="#" @click.prevent="logout">Logout({{ userName }})</a>
                  </li>
                  <li class="nav-item" v-else>
                    <a class="nav-link" href="login.html">Login/Register</a>
                  </li>
                <li class="nav-item" v-if="isAdmin">
                  <a class="nav-link" href="admin_dashboard.html">Admin Dashboard</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>

<div id="reqResetApp">
  <div class="main-container">
    <h2>Request Password Reset</h2>
    <form @submit.prevent="handleRequestReset">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" v-model="email" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <div v-if="message" class="alert mt-3" :class="{'alert-success': success, 'alert-danger': !success}">
      {{ message }}
    </div>
  </div>
</div>

<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js">
</script>
<script>
const navApp = Vue.createApp({});
navApp.mount('#navApp');
</script>

<script>
const reqResetApp = Vue.createApp({
  data() {
    return {
      email: '',
      message: '',
      success: false
    };
  },
  methods: {
    async handleRequestReset() {
      try {
        const r = await fetch('password_reset.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            action: 'request_reset',
            email: this.email
          })
        });
        const j = await r.json();
        this.success = j.success;
        this.message = j.message;
      } catch(e) {
        console.error(e);
      }
    }
  }
});
reqResetApp.mount('#reqResetApp');
</script>

</body>
</html>
